<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>Portfolio Thumbnail</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=Fira+Code:wght@400;500&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0c1019;
    font-family: 'Inter', system-ui, sans-serif;
    color: #eef0f5;
    position: relative;
    isolation: isolate;
  }

  /* ── Dot grid ── */
  .grid {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-image: radial-gradient(circle, rgba(91,141,239,0.18) 1px, transparent 1px);
    background-size: 36px 36px;
    mask-image: radial-gradient(ellipse 90% 80% at 60% 50%, black 0%, transparent 75%);
  }

  /* ── Blue radial glow ── */
  .glow {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(ellipse 60% 70% at 22% 45%, rgba(91,141,239,0.22) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 75% 70%, rgba(91,141,239,0.10) 0%, transparent 65%);
  }

  /* ── CRT scanlines ── */
  .scanlines {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 3px
    );
    mix-blend-mode: multiply;
  }

  /* ── Left accent bar ── */
  .accent-bar {
    position: absolute;
    left: 72px;
    top: 80px;
    bottom: 80px;
    width: 2px;
    background: linear-gradient(to bottom, transparent, #5B8DEF 20%, #5B8DEF 80%, transparent);
    z-index: 3;
  }

  /* ── Corner marks ── */
  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    z-index: 3;
  }
  .corner-tl { top: 28px; left: 28px; border-top: 1.5px solid rgba(91,141,239,0.5); border-left: 1.5px solid rgba(91,141,239,0.5); }
  .corner-tr { top: 28px; right: 28px; border-top: 1.5px solid rgba(91,141,239,0.5); border-right: 1.5px solid rgba(91,141,239,0.5); }
  .corner-bl { bottom: 28px; left: 28px; border-bottom: 1.5px solid rgba(91,141,239,0.5); border-left: 1.5px solid rgba(91,141,239,0.5); }
  .corner-br { bottom: 28px; right: 28px; border-bottom: 1.5px solid rgba(91,141,239,0.5); border-right: 1.5px solid rgba(91,141,239,0.5); }

  /* ── Content layout ── */
  .content {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 96px 0 108px;
  }

  /* ── Eyebrow ── */
  .eyebrow {
    font-family: 'Fira Code', ui-monospace, monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: #5B8DEF;
    margin-bottom: 28px;
  }

  /* ── Name ── */
  .name {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 96px;
    line-height: 0.95;
    letter-spacing: -0.025em;
    color: #eef0f5;
    margin-bottom: 28px;
    font-weight: 400;
  }

  /* ── Role ── */
  .role {
    font-size: 26px;
    font-weight: 500;
    color: #eef0f5;
    margin-bottom: 44px;
    letter-spacing: -0.01em;
  }
  .role .dash { color: #5B8DEF; }

  /* ── Status badge ── */
  .status {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Fira Code', monospace;
    font-size: 12px;
    color: rgba(238,240,245,0.6);
    padding: 10px 18px;
    border: 1px solid rgba(91,141,239,0.25);
    border-radius: 999px;
    background: rgba(22,27,42,0.6);
    width: fit-content;
    margin-bottom: 52px;
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: oklch(70% 0.15 145);
    flex-shrink: 0;
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, rgba(91,141,239,0.35) 0%, rgba(91,141,239,0.1) 50%, transparent 100%);
    margin-bottom: 28px;
  }

  /* ── Projects row ── */
  .projects {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .project-chip {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: rgba(238,240,245,0.45);
    padding: 6px 14px;
    border: 1px solid rgba(91,141,239,0.2);
    border-radius: 4px;
    background: rgba(91,141,239,0.05);
  }

  /* ── URL bottom-right ── */
  .url {
    position: absolute;
    bottom: 42px;
    right: 72px;
    font-family: 'Fira Code', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: rgba(91,141,239,0.55);
    z-index: 4;
  }

  /* ── Right decorative wireframe ── */
  .wireframe {
    position: absolute;
    right: 72px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 3;
    opacity: 0.18;
  }
</style>
</head>
<body>

  <div class="grid"></div>
  <div class="glow"></div>
  <div class="scanlines"></div>
  <div class="accent-bar"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Right decorative wireframe -->
  <svg class="wireframe" width="340" height="420" viewBox="0 0 340 420" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Outer rect -->
    <rect x="1" y="1" width="338" height="418" rx="4" stroke="#5B8DEF" stroke-width="1"/>
    <!-- Inner grid lines vertical -->
    <line x1="85"  y1="1"   x2="85"  y2="419" stroke="#5B8DEF" stroke-width="0.5" stroke-dasharray="4 6"/>
    <line x1="170" y1="1"   x2="170" y2="419" stroke="#5B8DEF" stroke-width="0.5" stroke-dasharray="4 6"/>
    <line x1="255" y1="1"   x2="255" y2="419" stroke="#5B8DEF" stroke-width="0.5" stroke-dasharray="4 6"/>
    <!-- Inner grid lines horizontal -->
    <line x1="1"   y1="105" x2="339" y2="105" stroke="#5B8DEF" stroke-width="0.5" stroke-dasharray="4 6"/>
    <line x1="1"   y1="210" x2="339" y2="210" stroke="#5B8DEF" stroke-width="0.5" stroke-dasharray="4 6"/>
    <line x1="1"   y1="315" x2="339" y2="315" stroke="#5B8DEF" stroke-width="0.5" stroke-dasharray="4 6"/>
    <!-- Corner crosshairs -->
    <line x1="0"  y1="0"   x2="20" y2="0"  stroke="#5B8DEF" stroke-width="2"/>
    <line x1="0"  y1="0"   x2="0"  y2="20" stroke="#5B8DEF" stroke-width="2"/>
    <line x1="320" y1="0"  x2="340" y2="0"   stroke="#5B8DEF" stroke-width="2"/>
    <line x1="340" y1="0"  x2="340" y2="20"  stroke="#5B8DEF" stroke-width="2"/>
    <line x1="0"   y1="400" x2="0"   y2="420" stroke="#5B8DEF" stroke-width="2"/>
    <line x1="0"   y1="420" x2="20"  y2="420" stroke="#5B8DEF" stroke-width="2"/>
    <line x1="340" y1="400" x2="340" y2="420" stroke="#5B8DEF" stroke-width="2"/>
    <line x1="320" y1="420" x2="340" y2="420" stroke="#5B8DEF" stroke-width="2"/>
    <!-- Center circle -->
    <circle cx="170" cy="210" r="60" stroke="#5B8DEF" stroke-width="1"/>
    <circle cx="170" cy="210" r="3"  fill="#5B8DEF"/>
    <!-- Diagonal cross through center -->
    <line x1="110" y1="150" x2="230" y2="270" stroke="#5B8DEF" stroke-width="0.5" opacity="0.5"/>
    <line x1="230" y1="150" x2="110" y2="270" stroke="#5B8DEF" stroke-width="0.5" opacity="0.5"/>
    <!-- Axis lines -->
    <line x1="170" y1="150" x2="170" y2="270" stroke="#5B8DEF" stroke-width="0.8"/>
    <line x1="110" y1="210" x2="230" y2="210" stroke="#5B8DEF" stroke-width="0.8"/>
  </svg>

  <div class="content">
    <p class="eyebrow">Portfolio — 2026</p>
    <h1 class="name">Rohan Katara</h1>
    <p class="role"><span class="dash">—&nbsp;</span>AI Engineer</p>
    <div class="status">
      <span class="status-dot"></span>
      <span>Available for opportunities</span>
    </div>
    <div class="divider"></div>
    <div class="projects">
      <span class="project-chip">MockTalk</span>
      <span class="project-chip">Krishna.AI</span>
      <span class="project-chip">Automate Pro</span>
      <span class="project-chip">Content Engine</span>
    </div>
  </div>

  <span class="url">rohankatara.com</span>

</body>
</html>
