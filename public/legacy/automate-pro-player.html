<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Automate Pro — Demo Player</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Full-screen iframe — fills every pixel, no bars, no cropping */
    .player-iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* Close button sits above the iframe */
    .close-btn {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 20;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.05rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .close-btn:hover  { background: rgba(255, 255, 255, 0.15); color: #fff; }
    .close-btn:active { transform: scale(0.92); }
  </style>
</head>
<body>

  <iframe
    class="player-iframe"
    src="/automate-pro-demo/index.html"
    allow="autoplay"
    title="Automate Pro: AI Lead Gatekeeper — Interactive Demo"
  ></iframe>

  <button
    class="close-btn"
    onclick="window.parent.postMessage('closeDemoPlayer', '*')"
    aria-label="Close demo"
  >&#10005;</button>

</body>
</html>
